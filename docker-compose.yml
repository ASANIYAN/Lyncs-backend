services:
  api:
    profiles: ['app']
    build:
      context: .
      target: runner
      args:
        - NODE_ENV=production
        - THREADPOOL_SIZE=${UV_THREADPOOL_SIZE:-128}
        - PORT=${PORT:-3000}
    ports:
      - '${PORT:-3000}:3000'
    env_file:
      - .env.docker
    environment:
      - NODE_ENV=production
    depends_on:
      migrator:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    networks:
      - backend

  worker:
    profiles: ['app']
    build:
      context: .
      target: runner
      args:
        - NODE_ENV=production
        - THREADPOOL_SIZE=${UV_THREADPOOL_SIZE:-128}
        - PORT=${PORT:-3000}
    command: npm run start:worker
    env_file:
      - .env.docker
    environment:
      - NODE_ENV=production
      - ENABLE_HTTP=false
      - ENABLE_WORKERS=true
    depends_on:
      migrator:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    networks:
      - backend

  migrator:
    profiles: ['app']
    build:
      context: .
      target: runner
      args:
        - NODE_ENV=production
        - THREADPOOL_SIZE=${UV_THREADPOOL_SIZE:-128}
        - PORT=${PORT:-3000}
    command: npm run migration:run:prod
    env_file:
      - .env.docker
    environment:
      - NODE_ENV=production
    depends_on:
      db:
        condition: service_healthy
    restart: 'no'
    networks:
      - backend

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    ports:
      - '${DB_PORT}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME} -d ${DB_NAME}']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend

  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --save ""
      --appendonly no
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --tcp-backlog 511
      --timeout 0
      --tcp-keepalive 300
    ports:
      - '${REDIS_PORT:-6379}:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend

networks:
  backend:
    driver: bridge

volumes:
  postgres_data:
