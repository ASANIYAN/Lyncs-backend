services:
  api:
    build:
      context: .
      target: runner
      args:
        - NODE_ENV=${NODE_ENV:-development}
        - THREADPOOL_SIZE=${UV_THREADPOOL_SIZE:-128}
        - PORT=${PORT:-3000}
    ports:
      - '${PORT:-3000}:3000'
    env_file:
      - .env.docker
    environment:
      - NODE_ENV=${NODE_ENV:-development}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend

  worker:
    build:
      context: .
      target: runner
      args:
        - NODE_ENV=${NODE_ENV:-development}
        - THREADPOOL_SIZE=${UV_THREADPOOL_SIZE:-128}
        - PORT=${PORT:-3000}
    command: npm run start:worker
    env_file:
      - .env.docker
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - ENABLE_HTTP=false
      - ENABLE_WORKERS=true
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    ports:
      - '${DB_PORT}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME} -d ${DB_NAME}']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend

  redis:
    image: redis:7-alpine
    ports:
      - '${REDIS_PORT:-6379}:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend

networks:
  backend:
    driver: bridge

volumes:
  postgres_data:
