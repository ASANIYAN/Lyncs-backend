services:
  - type: web
    name: url-shortener-api
    runtime: docker
    plan: free
    region: oregon # or singapore, frankfurt, ohio
    branch: main
    dockerfilePath: ./Dockerfile
    dockerContext: .

    # Health check endpoint
    healthCheckPath: /health

    # Environment variables
    envVars:
      - key: NODE_ENV
        value: production

      - key: PORT
        value: 10000 # Render uses port 10000 internally

      - key: DATABASE_URL
        sync: false # Will set this as secret via CLI

      - key: REDIS_URL
        sync: false # Will set this as secret via CLI

      - key: JWT_ACCESS_SECRET
        generateValue: true # Auto-generates random secret

      - key: JWT_REFRESH_SECRET
        generateValue: true # Auto-generates random secret

      - key: AUTH_SALT_ROUNDS
        value: 12

      - key: MAX_URLS_PER_HOUR
        value: 50

      - key: OTP_TTL_SECONDS
        value: 600

      - key: OTP_MAX_ATTEMPTS
        value: 5

      - key: MAIL_HOST
        sync: false # Mailtrap for dev / Resend for prod

      - key: MAIL_PORT
        sync: false

      - key: MAIL_SECURE
        sync: false

      - key: MAIL_USER
        sync: false

      - key: MAIL_PASS
        sync: false

      - key: MAIL_FROM
        sync: false

      - key: GOOGLE_WEB_RISK_API_KEY
        sync: false # Set via Render dashboard or CLI as a secret
